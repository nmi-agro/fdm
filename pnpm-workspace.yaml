packages:
  - fdm-core
  - fdm-data
  - fdm-calculator
  - fdm-docs
  - fdm-app
  - fdm-rvo
  - fdm-agents
  - fdm-api
  - fdm-helpdesk

catalog:
  '@better-auth/api-key': ^1.6.11
  jose: ^6.2.3
  '@dotenvx/dotenvx': ^1.69.1
  '@types/node': ^25.9.1
  '@vitest/coverage-v8': 4.1.7
  better-auth: ^1.6.11
  drizzle-kit: ^0.31.10
  drizzle-orm: ^0.45.2
  tsdown: ^0.22.0
  typedoc: ^0.28.19
  typedoc-plugin-missing-exports: ^4.1.3
  typescript: ^6.0.3
  vite-tsconfig-paths: ^5.1.4
  vitest: ^4.1.7

strictDepBuilds: true
blockExoticSubdeps: true
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@nmi-agro/*'
allowBuilds:
  '@geomatico/maplibre-cog-protocol': true
  '@google/genai': true
  '@nmi-agro/fdm-agents': true
  '@nmi-agro/fdm-calculator': true
  '@nmi-agro/fdm-core': true
  '@nmi-agro/fdm-data': true
  '@nmi-agro/fdm-rvo': true
  '@sentry-internal/node-cpu-profiler': true
  '@sentry/cli': true
  '@swc/core': true
  core-js: true
  esbuild: true
  protobufjs: true
  sharp: true
  sqlite3: true
